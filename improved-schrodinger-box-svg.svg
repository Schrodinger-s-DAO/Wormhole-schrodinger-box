<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Sfondo con gradiente leggero -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4ff" />
      <stop offset="100%" stop-color="#e6edff" />
    </linearGradient>
    <radialGradient id="glow-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#a4c3ff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#a4c3ff" stop-opacity="0" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>
  </defs>
  
  <!-- Sfondo -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>
  
  <!-- Effetto brillantezza dietro la scatola -->
  <circle cx="250" cy="200" r="120" fill="url(#glow-gradient)" filter="url(#glow)"/>
  
  <!-- Ombra sotto la scatola -->
  <rect x="120" y="290" width="260" height="20" rx="10" ry="10" fill="#aabae4" opacity="0.5" filter="url(#glow)"/>
  
  <!-- Scatola di base -->
  <rect x="120" y="130" width="260" height="160" rx="15" ry="15" fill="#6973af" stroke="#3d466e" stroke-width="4"/>
  
  <!-- Riflessi sulla scatola -->
  <rect x="120" y="130" width="260" height="80" rx="15" ry="15" fill="#8896d4" stroke="none"/>
  <rect x="120" y="130" width="260" height="40" rx="15" ry="15" fill="#a5b1e5" stroke="none"/>
  
  <!-- Bordo della scatola -->
  <rect x="120" y="130" width="260" height="160" rx="15" ry="15" fill="none" stroke="#3d466e" stroke-width="4"/>
  
  <!-- Coperchio (linea di separazione) -->
  <line x1="120" y1="170" x2="380" y2="170" stroke="#3d466e" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Effetto luccichio -->
  <circle cx="140" cy="150" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="155" cy="145" r="3" fill="#ffffff" opacity="0.6"/>
  
  <!-- Campo di energia quantistica all'interno -->
  <rect x="140" y="190" width="220" height="80" rx="10" ry="10" fill="#3d4a87" stroke="#2e386a" stroke-width="2"/>
  
  <!-- Simbolo quantistico pulsante (phi) -->
  <text x="250" y="240" font-family="Arial" font-size="60" text-anchor="middle" fill="#a5b1e5" opacity="0.9">φ</text>
  <circle cx="250" cy="230" r="40" fill="none" stroke="#a5c9ff" stroke-width="2" opacity="0.8">
    <animate attributeName="r" values="40;45;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Particelle quantistiche (punti colorati animati) -->
  <circle cx="200" cy="200" r="5" fill="#91d6ff" opacity="0.9">
    <animate attributeName="cx" values="200;210;200" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="200;190;200" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="220" r="4" fill="#ff9ac0" opacity="0.8">
    <animate attributeName="cx" values="300;290;300" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="220;230;220" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="250" r="6" fill="#ffcb85" opacity="0.8">
    <animate attributeName="cx" values="250;260;250" dur="1.7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="250;240;250" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="210" r="3" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="230" r="2" fill="#ffffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="1.3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Linee di energia quantistica pulsanti -->
  <path d="M160,190 L170,270 M190,190 L185,270 M220,190 L225,270 M250,190 L245,270 M280,190 L275,270 M310,190 L305,270 M340,190 L330,270" 
        stroke="#a5c9ff" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <!-- Particelle luminose extra -->
  <circle cx="335" cy="125" r="6" fill="#a5c9ff" opacity="0.8">
    <animate attributeName="r" values="6;8;6" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="140" r="4" fill="#ffffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.7s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Aura quantistica intorno alla scatola (cerchio pulsante) -->
  <circle cx="250" cy="200" r="160" fill="none" stroke="#a4c3ff" stroke-width="2" stroke-dasharray="10,15" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;50;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="r" values="160;170;160" dur="15s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="7s" repeatCount="indefinite"/>
  </circle>
</svg>